name: Check Upstream Open Design Version

on:
  schedule:
    - cron: "23 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-and-tag:
    runs-on: ubuntu-latest

    env:
      UPSTREAM_REPO: nexu-io/open-design

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package.json

      - name: Install DMG tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y 7zip dmg2img jq

      - name: Install dependencies
        run: npm install --include=dev

      - name: Determine latest local tag
        id: latest_tag
        run: |
          TAG="$(git tag -l 'v*' | sort -V | tail -n 1 || true)"
          TAG="${TAG#v}"
          echo "version=${TAG}" >> "${GITHUB_OUTPUT}"

      - name: Resolve latest upstream version
        id: upstream
        run: |
          set -euo pipefail
          # The upstream releases list is unreliable for version detection
          # (some releases are unlisted, e.g. 0.11.0 exists as a downloadable
          # asset but never appears in the releases API list). So we derive the
          # latest version directly from the most recent open-design-v* git tag
          # in the upstream repo via the lightweight tags API, which lists all
          # tags regardless of release status.
          RESPONSE="$(curl -fsSL \
            -H 'Accept: application/vnd.github+json' \
            "https://api.github.com/repos/${UPSTREAM_REPO}/tags?per_page=100")"
          LATEST_TAG="$(printf '%s' "${RESPONSE}" | jq -r '
              [.[] | select(.name | startswith("open-design-v"))]
              | sort_by(.name) | reverse | .[0].name // empty')"
          if [[ -z "${LATEST_TAG}" || "${LATEST_TAG}" == "null" ]]; then
            echo "No open-design-v* tag found upstream." >&2
            exit 1
          fi
          LATEST_VERSION="${LATEST_TAG#open-design-v}"
          echo "version=${LATEST_VERSION}" >> "${GITHUB_OUTPUT}"
          # Derive the DMG URL deterministically from the version. This works
          # for listed AND unlisted releases because the asset URL scheme is
          # stable.
          ASSET_URL="https://github.com/${UPSTREAM_REPO}/releases/download/open-design-v${LATEST_VERSION}/open-design-${LATEST_VERSION}-mac-x64.dmg"
          echo "asset_url=${ASSET_URL}" >> "${GITHUB_OUTPUT}"
          echo "Latest upstream tag: ${LATEST_TAG} (version ${LATEST_VERSION})"
          echo "Derived DMG URL: ${ASSET_URL}"

      - name: Compare with tracked version
        id: changed
        run: |
          set -euo pipefail
          NEW_VERSION="${{ steps.upstream.outputs.version }}"
          STORED=""
          [[ -f upstream-version.txt ]] && STORED="$(tr -d '\r\n' < upstream-version.txt)"
          # Only treat as "changed" when the upstream version is NEWER than what
          # we last packaged. This avoids downgrading when the pinned version
          # (e.g. 0.11.0) is higher than the latest API-visible release (0.9.0),
          # which happens because some upstream releases are unlisted.
          if [[ -z "${STORED}" ]]; then
            # First run: package whatever upstream exposes.
            echo "changed=true" >> "${GITHUB_OUTPUT}"
            echo "No tracked version; packaging ${NEW_VERSION}."
            exit 0
          fi
          newer="$(printf '%s\n%s\n' "${STORED}" "${NEW_VERSION}" | sort -V | tail -n1)"
          if [[ "${STORED}" != "${NEW_VERSION}" && "${newer}" == "${NEW_VERSION}" ]]; then
            echo "changed=true" >> "${GITHUB_OUTPUT}"
            echo "Upstream version newer: ${STORED} -> ${NEW_VERSION}"
          else
            echo "changed=false" >> "${GITHUB_OUTPUT}"
            if [[ "${STORED}" == "${NEW_VERSION}" ]]; then
              echo "Upstream version unchanged at ${NEW_VERSION}."
            else
              echo "Upstream version ${NEW_VERSION} is not newer than packaged ${STORED}; skipping (unlisted-release safe)."
            fi
          fi

      - name: Download Open Design DMG
        if: steps.changed.outputs.changed == 'true'
        run: curl -fL "${{ steps.upstream.outputs.asset_url }}" -o open-design.dmg

      - name: Verify downloaded DMG
        if: steps.changed.outputs.changed == 'true'
        run: |
          test -s open-design.dmg
          file open-design.dmg

      - name: Read upstream Open Design version
        if: steps.changed.outputs.changed == 'true'
        id: version
        run: |
          VERSION="$(bash scripts/get-open-design-version.sh ./open-design.dmg)"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "Upstream version (from DMG): ${VERSION}"

      - name: Create commit and optional tag when upstream changed
        if: steps.changed.outputs.changed == 'true'
        env:
          RELEASE_PAT: ${{ secrets.RELEASE_PAT }}
        run: |
          set -euo pipefail
          NEW_URL="${{ steps.upstream.outputs.asset_url }}"
          NEW_VERSION="${{ steps.version.outputs.version }}"
          LATEST_LOCAL_VERSION="${{ steps.latest_tag.outputs.version }}"
          VERSION_CHANGED="false"
          if [[ "${NEW_VERSION}" != "${LATEST_LOCAL_VERSION}" ]]; then
            VERSION_CHANGED="true"
          fi

          if [[ "${VERSION_CHANGED}" == "true" && -z "${RELEASE_PAT}" ]]; then
            echo "RELEASE_PAT secret is required to push version tags that trigger the release workflow." >&2
            echo "Set Settings -> Secrets and variables -> Actions -> RELEASE_PAT with repo+workflow scopes." >&2
            exit 1
          fi

          echo "${NEW_URL}" > upstream-asset-url.txt
          if [[ "${VERSION_CHANGED}" == "true" ]]; then
            echo "${NEW_VERSION}" > upstream-version.txt
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [[ -n "${RELEASE_PAT}" ]]; then
            git config --local --unset-all http.https://github.com/.extraheader || true
            git remote set-url origin "https://x-access-token:${RELEASE_PAT}@github.com/${GITHUB_REPOSITORY}.git"
          fi

          git add upstream-asset-url.txt
          if [[ "${VERSION_CHANGED}" == "true" ]]; then
            git add upstream-version.txt
          fi

          if ! git diff --cached --quiet; then
            if [[ "${VERSION_CHANGED}" == "true" ]]; then
              COMMIT_MSG="chore: bump upstream Open Design to ${NEW_VERSION}"
            else
              COMMIT_MSG="chore: update upstream Open Design DMG url"
            fi
            git commit -m "${COMMIT_MSG}"
            git push origin HEAD:${GITHUB_REF_NAME}
          else
            echo "Tracking files unchanged, skipping commit."
          fi

          if [[ "${VERSION_CHANGED}" == "true" ]]; then
            NEW_TAG="v${NEW_VERSION}"
            if git rev-parse "${NEW_TAG}" >/dev/null 2>&1; then
              echo "Tag ${NEW_TAG} already exists. Nothing to do."
              exit 0
            fi
            git tag "${NEW_TAG}"
            git push origin "${NEW_TAG}"
          else
            echo "Upstream DMG changed but app version stayed at ${NEW_VERSION}; skipping tag."
          fi

      - name: No update
        if: steps.changed.outputs.changed != 'true'
        run: |
          echo "Upstream version unchanged (latest: ${{ steps.upstream.outputs.version }})"
